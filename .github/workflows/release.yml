name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build standalone binary
        run: bun build ./src/cli.ts --compile --outfile ./dist/package-diff
      - name: Rename binary
        run: mv ./dist/package-diff ./dist/package-diff-darwin-arm64
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: package-diff-darwin-arm64
          path: ./dist/package-diff-darwin-arm64

  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build standalone binary
        run: bun build ./src/cli.ts --compile --outfile ./dist/package-diff
      - name: Rename binary
        run: mv ./dist/package-diff ./dist/package-diff-darwin-x64
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: package-diff-darwin-x64
          path: ./dist/package-diff-darwin-x64

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build standalone binary
        run: bun build ./src/cli.ts --compile --outfile ./dist/package-diff
      - name: Rename binary
        run: mv ./dist/package-diff ./dist/package-diff-linux-x64
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: package-diff-linux-x64
          path: ./dist/package-diff-linux-x64

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build standalone binary
        run: bun build ./src/cli.ts --compile --outfile ./dist/package-diff.exe
      - name: Rename binary
        run: mv ./dist/package-diff.exe ./dist/package-diff-windows-x64.exe
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: package-diff-windows-x64
          path: ./dist/package-diff-windows-x64.exe

  release:
    needs:
      - build-macos-arm64
      - build-macos-x64
      - build-linux-x64
      - build-windows-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/package-diff-darwin-arm64
            ./artifacts/package-diff-darwin-x64
            ./artifacts/package-diff-linux-x64
            ./artifacts/package-diff-windows-x64.exe
